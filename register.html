<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — EventHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">
      <span class="logo-icon">E</span>
      EventHub
    </a>
    <button class="nav-toggle" id="navToggle">☰</button>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="create-event.html">Create Event</a></li>
      <li><a href="about.html">About</a></li>
      <li id="authLinks"></li>
    </ul>
  </div>
</nav>

<section class="section">
  <div class="form-container">
    <h2>Create Account</h2>
    <p class="form-intro">Join the EventHub community today — it's free!</p>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" required>
        </div>

        <div class="form-group">
          <label for="password2">Confirm</label>
          <input type="password" id="password2" placeholder="Repeat password" required>
        </div>
      </div>

      <div class="form-group">
        <label for="role">Account Type</label>
        <select id="role" required>
          <option value="">Select role...</option>
          <option value="user">Attendee — Join events</option>
          <option value="organizer">Organizer — Host events</option>
        </select>
      </div>

      <div class="form-error" id="formError"></div>

      <button type="submit" class="btn btn-accent btn-block">Create Account</button>

      <p class="form-footer">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </form>
  </div>
</section>

<footer class="footer">
  <div class="footer-content">
    <a href="index.html" class="footer-logo">
      <span class="logo-icon">E</span>
      EventHub
    </a>
    <p>&copy; 2026 EventHub. All rights reserved.</p>
  </div>
</footer>

<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
